<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyOrdr | Sign-In Problem</title>
  <link rel="icon" href="/assets/Myordr_logo.png">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #faf3ef 0%, #f3f3ef 100%);
      color: #231b18;
      font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
    }
    .card {
      width: min(100%, 560px);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(35, 27, 24, 0.08);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 18px 44px rgba(35, 27, 24, 0.1);
      text-align: center;
    }
    h1 { margin-bottom: 10px; }
    p { line-height: 1.65; color: #6b615d; }
    .actions { margin-top: 24px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    a {
      min-height: 48px;
      padding: 0 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .primary { background: #3f7a67; color: white; }
    .secondary { background: white; color: #231b18; border: 1px solid rgba(35, 27, 24, 0.08); }
    code { font-size: 0.92rem; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/assets/Myordr_logo.png" alt="MyOrdr logo" width="64" height="64">
    <h1>We hit a sign-in problem</h1>
    <p id="reason">The authentication request did not finish correctly. Please head back to the app and try again.</p>
    <div class="actions">
      <a class="primary" href="myordr://login">Open MyOrdr</a>
      <a class="secondary" href="/support/">Get Support</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get("error_description") || params.get("error");
    if (error) {
      document.getElementById("reason").innerHTML =
        `The provider returned: <code>${error}</code>. Try again from MyOrdr, or contact support if it keeps happening.`;
    }
  </script>
</body>
</html>
