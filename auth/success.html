<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyOrdr | Sign-In Complete</title>
  <link rel="icon" href="/assets/Myordr_logo.png">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f7f1e4 0%, #eef3ee 100%);
      color: #18201b;
      font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
      padding: 24px;
    }
    .card {
      width: min(100%, 540px);
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid rgba(24, 32, 27, 0.08);
      border-radius: 24px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(24, 32, 27, 0.1);
    }
    img { width: 64px; height: 64px; border-radius: 18px; }
    h1 { margin: 18px 0 10px; }
    p { color: #5d665f; line-height: 1.6; }
    .muted { font-size: 0.95rem; }
    .actions { margin-top: 24px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .button {
      min-height: 48px;
      padding: 0 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .primary { background: #3f7a67; color: white; }
    .secondary { background: white; color: #18201b; border: 1px solid rgba(24, 32, 27, 0.08); }
  </style>
</head>
<body>
  <div class="card">
    <img src="/assets/Myordr_logo.png" alt="MyOrdr logo">
    <h1>Sign-in complete</h1>
    <p id="message">We’re sending you back to MyOrdr now.</p>
    <p class="muted">If the app does not open, use the button below.</p>
    <div class="actions">
      <a id="open-app" class="button primary" href="myordr://auth/success">Open MyOrdr</a>
      <a class="button secondary" href="/">Go to site</a>
    </div>
  </div>

  <script>
    const appHref = `myordr://auth/success${window.location.search}${window.location.hash}`;
    document.getElementById("open-app").href = appHref;
    document.getElementById("message").textContent = window.location.hash || window.location.search
      ? "We kept your auth details and are handing them back to the app."
      : "We’re sending you back to MyOrdr now.";

    setTimeout(() => {
      window.location.href = appHref;
    }, 600);
  </script>
</body>
</html>
