<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyOrdr - User Profile</title>
    <meta name="apple-itunes-app" content="app-id=6746293263, app-argument=https://app.myordr.co/u/">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #f7f1e4 0%, #eef3ee 100%);
            color: #18201b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 440px;
            width: 100%;
            text-align: center;
            padding: 40px;
            background: rgba(255, 253, 248, 0.94);
            border: 1px solid rgba(24, 32, 27, 0.08);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(24, 32, 27, 0.1);
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #3A6B6B;
            margin-bottom: 24px;
        }

        .profile-info {
            margin-bottom: 16px;
        }

        .username {
            font-size: 24px;
            font-weight: 700;
            color: #3A6B6B;
        }

        .message {
            font-size: 18px;
            color: #18201b;
            margin-bottom: 12px;
        }

        p {
            color: #5d665f;
            line-height: 1.6;
        }

        .store-actions {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }

        .download-button {
            background-color: #3A6B6B;
            color: white;
            padding: 15px 18px;
            border: 1px solid transparent;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 150px;
            transition: background-color 0.3s ease;
        }

        .download-button:hover {
            background-color: #2d5555;
        }

        .download-button.secondary {
            background: white;
            color: #18201b;
            border-color: rgba(24, 32, 27, 0.12);
        }

        .fallback-message {
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">MyOrdr</div>
        <div class="profile-info">
            <div class="username" id="username">User Profile</div>
        </div>
        <div class="message" id="message">Opening profile in app...</div>
        <div class="fallback-message" id="fallback">
            <p>Don't have MyOrdr yet? Download the app to view shared profiles and save exact orders.</p>
            <div class="store-actions">
                <a href="https://apps.apple.com/us/app/myordr/id6746293263" class="download-button">Apple App Store</a>
                <a href="https://play.google.com/store/apps/details?id=com.myordr.app.myordr_flutter&amp;pcampaignid=web_share" class="download-button secondary">Google Play</a>
            </div>
        </div>
    </div>

    <script>
        const appStoreUrl = "https://apps.apple.com/us/app/myordr/id6746293263";
        const playStoreUrl = "https://play.google.com/store/apps/details?id=com.myordr.app.myordr_flutter&pcampaignid=web_share";

        function fallbackStoreUrl() {
            const agent = navigator.userAgent || "";
            if (/Android/i.test(agent)) return playStoreUrl;
            if (/iPad|iPhone|iPod/i.test(agent)) return appStoreUrl;
            return null;
        }

        function getUsernameFromURL() {
            const params = new URLSearchParams(window.location.search);
            const queryId = params.get('id') || params.get('user') || params.get('profile');
            if (queryId) return queryId;

            const hashId = window.location.hash.replace(/^#\/?/, '');
            if (hashId) return hashId;

            const segments = window.location.pathname.split('/').filter(Boolean);
            if (segments.length >= 2 && (segments[0] === 'u' || segments[0] === 'profile')) {
                return segments[1];
            }
            return 'user';
        }

        const username = getUsernameFromURL();
        document.getElementById('username').textContent = `@${username}`;

        const appUrl = `myordr://u/${username}`;
        const appLink = document.createElement('a');
        appLink.href = appUrl;
        appLink.style.display = 'none';
        document.body.appendChild(appLink);
        appLink.click();

        let hasOpenedApp = false;
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) hasOpenedApp = true;
        });
        window.addEventListener('beforeunload', function() {
            hasOpenedApp = true;
        });
        window.addEventListener('pagehide', function() {
            hasOpenedApp = true;
        });

        setTimeout(() => {
            if (!hasOpenedApp) {
                document.getElementById('message').textContent = `Check out @${username}'s profile on MyOrdr!`;
                document.getElementById('fallback').style.display = 'block';
            }
        }, 2000);

        setTimeout(() => {
            const storeUrl = fallbackStoreUrl();
            if (!hasOpenedApp && storeUrl) {
                window.location.href = storeUrl;
            }
        }, 5000);
    </script>
</body>
</html>
